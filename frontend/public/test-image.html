<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片测试</title>
    <style>
        .test-card {
            width: 300px;
            height: 200px;
            margin: 20px;
            border: 2px solid #ccc;
        }
        .test1 {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('/images/cities/changsha-new.jpg');
            background-position: center;
            background-size: cover;
        }
        .test2 {
            background: url('/images/cities/changsha-new.jpg') center/cover;
        }
        .test3 {
            background-image: url('/images/cities/changsha-new.jpg');
            background-position: center;
            background-size: cover;
        }
    </style>
</head>
<body>
    <h1>图片加载测试</h1>

    <h2>测试1: background-image + linear-gradient</h2>
    <div class="test-card test1"></div>

    <h2>测试2: background 简写</h2>
    <div class="test-card test2"></div>

    <h2>测试3: 只有 background-image</h2>
    <div class="test-card test3"></div>

    <h2>测试4: img 标签</h2>
    <img src="/images/cities/changsha-new.jpg" width="300" alt="长沙">

    <h2>测试5: 原始长沙图片（中文路径）</h2>
    <img src="/images/cities/长沙.jpg" width="300" alt="长沙原图">

    <h2>测试6: URL编码的中文路径</h2>
    <img src="/images/cities/%E9%95%BF%E6%B2%99.jpg" width="300" alt="长沙编码">
</body>
</html>
