<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试酒店页面自动导入</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-info {
            background: #f0f8ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .test-info h2 {
            margin-top: 0;
        }
        .console-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin: 10px 0;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #4CAF50;
            padding-left: 10px;
        }
        .log-entry.error {
            border-left-color: #f44336;
            color: #ff6b6b;
        }
        .log-entry.warn {
            border-left-color: #ff9800;
            color: #ffa726;
        }
        .log-entry.info {
            border-left-color: #2196F3;
            color: #64b5f6;
        }
        button {
            background: #00aa6c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #008c5a;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
    </style>
</head>
<body>
    <div class="test-info">
        <h2>🧪 酒店页面自动导入功能测试</h2>
        <p>这个页面会模拟hotel-page.html的自动导入流程，并显示详细的日志输出。</p>
        <button onclick="startTest()">开始测试</button>
        <button onclick="clearLogs()">清除日志</button>
        <button onclick="clearCache()">清除缓存</button>
        <button onclick="checkDatabase()">检查数据库</button>
    </div>

    <div id="status" class="status" style="display:none;"></div>

    <div class="console-output" id="consoleOutput">
        <div class="log-entry info">等待测试开始...</div>
    </div>

    <script type="module">
        import { initAutoLocationImport, autoLocationImportService } from './src/services/autoLocationImport.js';
        import { cityAutoImportService } from './src/services/cityAutoImport.js';

        const consoleOutput = document.getElementById('consoleOutput');
        const statusDiv = document.getElementById('status');

        // 拦截console.log
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'info');
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addLog(args.join(' '), 'error');
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addLog(args.join(' '), 'warn');
        };

        // 监听城市数据导入完成事件
        window.addEventListener('cityDataImported', (event) => {
            const { city, data } = event.detail;
            console.log(`✅ 城市数据导入完成事件触发: ${city}`);
            console.log(`导入数据: ${JSON.stringify(data, null, 2)}`);

            statusDiv.style.display = 'block';
            statusDiv.className = 'status success';
            statusDiv.innerHTML = `
                <strong>✅ 导入成功！</strong><br>
                城市: ${city}<br>
                酒店: ${data.imported?.hotels || 0}<br>
                景点: ${data.imported?.attractions || 0}<br>
                餐厅: ${data.imported?.restaurants || 0}
            `;
        });

        // 开始测试
        window.startTest = async function() {
            consoleOutput.innerHTML = '';
            statusDiv.style.display = 'block';
            statusDiv.className = 'status loading';
            statusDiv.textContent = '⏳ 正在测试自动导入功能...';

            console.log('========== 开始测试 ==========');
            console.log('1. 检查服务是否可用...');

            try {
                // 测试后端连接
                const testResponse = await fetch('http://localhost:3000/api/cities/stats/' + encodeURIComponent('北京'));
                console.log(`后端API状态: ${testResponse.status}`);

                if (!testResponse.ok) {
                    throw new Error('后端API不可用');
                }

                console.log('2. 开始自动定位和导入...');

                // 执行自动导入
                const result = await autoLocationImportService.autoLocationAndImport({
                    silent: false,
                    force: false
                });

                console.log('3. 导入结果:', JSON.stringify(result, null, 2));

                if (result.success) {
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        <strong>✅ 测试成功！</strong><br>
                        城市: ${result.city}<br>
                        ${result.cached ? '使用缓存数据' : '新导入数据'}<br>
                        ${result.data ? `酒店: ${result.data.imported?.hotels || 0}, 景点: ${result.data.imported?.attractions || 0}, 餐厅: ${result.data.imported?.restaurants || 0}` : ''}
                    `;
                } else {
                    throw new Error(result.message || '导入失败');
                }

            } catch (error) {
                console.error('测试失败:', error.message);
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `<strong>❌ 测试失败</strong><br>${error.message}`;
            }

            console.log('========== 测试结束 ==========');
        };

        // 清除日志
        window.clearLogs = function() {
            consoleOutput.innerHTML = '<div class="log-entry info">日志已清除</div>';
        };

        // 清除缓存
        window.clearCache = function() {
            autoLocationImportService.clearCache();
            console.log('✅ 缓存已清除');
            statusDiv.style.display = 'block';
            statusDiv.className = 'status success';
            statusDiv.textContent = '✅ 缓存已清除，下次访问将重新导入数据';
        };

        // 检查数据库
        window.checkDatabase = async function() {
            console.log('正在检查数据库...');

            try {
                const cities = ['北京', '上海', '广州', '深圳'];

                for (const city of cities) {
                    const response = await cityAutoImportService.getCityStats(city);
                    if (response.success) {
                        console.log(`${city}: 酒店=${response.data.hotels}, 景点=${response.data.attractions}, 餐厅=${response.data.restaurants}`);
                    }
                }

                statusDiv.style.display = 'block';
                statusDiv.className = 'status success';
                statusDiv.textContent = '✅ 数据库检查完成，请查看日志';
            } catch (error) {
                console.error('检查数据库失败:', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ 检查数据库失败: ' + error.message;
            }
        };

        console.log('测试页面已加载，点击"开始测试"按钮开始测试');
    </script>
</body>
</html>
