<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒店完整信息展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .control-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .control-group input, .control-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: #00aa6c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #009959;
        }

        #map-container {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .hotels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .hotel-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .hotel-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .hotel-photos {
            width: 100%;
            height: 200px;
            background: #e0e0e0;
            position: relative;
            overflow: hidden;
        }

        .hotel-photos img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-nav {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }

        .photo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .photo-dot.active {
            background: white;
        }

        .hotel-content {
            padding: 20px;
        }

        .hotel-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .hotel-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            flex: 1;
        }

        .hotel-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #ff9800;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }

        .hotel-info-row {
            display: flex;
            align-items: start;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .hotel-info-row .icon {
            margin-right: 8px;
            color: #999;
            min-width: 20px;
        }

        .hotel-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tag {
            padding: 4px 10px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 12px;
            font-size: 12px;
        }

        .tag.distance {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .tag.cost {
            background: #fff3e0;
            color: #e65100;
        }

        .hotel-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .btn-action {
            flex: 1;
            padding: 8px;
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background: #e0e0e0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            background: white;
            border-radius: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            background: white;
            border-radius: 8px;
        }

        .stats-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00aa6c;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .hotels-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏨 高德地图酒店完整信息展示</h1>

        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label>中心点经度</label>
                    <input type="number" id="lng" value="116.417592" step="0.000001">
                </div>
                <div class="control-group">
                    <label>中心点纬度</label>
                    <input type="number" id="lat" value="39.917723" step="0.000001">
                </div>
                <div class="control-group">
                    <label>搜索半径（米）</label>
                    <input type="number" id="radius" value="2000" min="100" max="10000" step="100">
                </div>
                <div class="control-group">
                    <label>返回数量</label>
                    <input type="number" id="pageSize" value="12" min="1" max="50">
                </div>
            </div>
            <div class="button-group">
                <button onclick="searchHotels()">🔍 搜索酒店</button>
                <button onclick="useCurrentLocation()">📍 使用当前位置</button>
            </div>
        </div>

        <div id="map-container"></div>

        <div id="stats-bar" style="display: none;"></div>

        <div id="results">
            <div class="empty-state">
                点击"搜索酒店"开始查找附近的酒店
            </div>
        </div>
    </div>

    <script type="module">
        import mapUtil from './map.js';

        let currentCenter = null;
        let currentHotels = [];

        // 初始化地图
        async function initMap() {
            const lng = parseFloat(document.getElementById('lng').value);
            const lat = parseFloat(document.getElementById('lat').value);
            currentCenter = [lng, lat];

            await mapUtil.initMap('map-container', {
                center: currentCenter,
                zoom: 14
            });

            mapUtil.addMarker(currentCenter, {
                title: '搜索中心',
                icon: new mapUtil.AMap.Icon({
                    size: new mapUtil.AMap.Size(30, 40),
                    image: '//a.amap.com/jsapi_demos/static/demo-center/icons/poi-marker-default.png',
                    imageSize: new mapUtil.AMap.Size(30, 40)
                })
            });
        }

        // 搜索酒店
        window.searchHotels = async function() {
            const lng = parseFloat(document.getElementById('lng').value);
            const lat = parseFloat(document.getElementById('lat').value);
            const radius = parseInt(document.getElementById('radius').value);
            const pageSize = parseInt(document.getElementById('pageSize').value);

            currentCenter = [lng, lat];

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">🔄 搜索中...</div>';

            try {
                mapUtil.clearMarkers();
                mapUtil.addMarker(currentCenter, {
                    title: '搜索中心',
                    icon: new mapUtil.AMap.Icon({
                        size: new mapUtil.AMap.Size(30, 40),
                        image: '//a.amap.com/jsapi_demos/static/demo-center/icons/poi-marker-default.png',
                        imageSize: new mapUtil.AMap.Size(30, 40)
                    })
                });

                const hotels = await mapUtil.searchNearbyHotels(currentCenter, {
                    radius: radius,
                    pageSize: pageSize
                });

                currentHotels = hotels;

                // 调试：打印第一个酒店的完整数据
                if (hotels.length > 0) {
                    console.log('第一个酒店的完整数据:', hotels[0]);
                    console.log('评分:', hotels[0].rating);
                    console.log('价格:', hotels[0].cost);
                }

                if (hotels.length > 0) {
                    displayHotels(hotels);
                    displayStats(hotels);
                    addMarkersToMap(hotels);
                    mapUtil.fitView();
                } else {
                    resultsDiv.innerHTML = '<div class="empty-state">未找到酒店，请尝试扩大搜索半径</div>';
                }
            } catch (error) {
                console.error('搜索失败:', error);
                resultsDiv.innerHTML = `<div class="empty-state" style="color: #ff4444;">搜索失败: ${error.message}</div>`;
            }
        };

        // 显示酒店列表
        function displayHotels(hotels) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            const grid = document.createElement('div');
            grid.className = 'hotels-grid';

            hotels.forEach((hotel, index) => {
                const card = createHotelCard(hotel, index);
                grid.appendChild(card);
            });

            resultsDiv.appendChild(grid);
        }

        // 创建酒店卡片
        function createHotelCard(hotel, index) {
            const card = document.createElement('div');
            card.className = 'hotel-card';

            // 图片轮播
            let photosHtml = '';
            if (hotel.photos && hotel.photos.length > 0) {
                photosHtml = `
                    <div class="hotel-photos" id="photos-${index}">
                        <img src="${hotel.photos[0].url}" alt="${hotel.name}">
                        ${hotel.photos.length > 1 ? `
                            <div class="photo-nav">
                                ${hotel.photos.map((_, i) => `<div class="photo-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            } else {
                photosHtml = `
                    <div class="hotel-photos" style="display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <div style="color: white; font-size: 48px;">🏨</div>
                    </div>
                `;
            }

            card.innerHTML = `
                ${photosHtml}
                <div class="hotel-content">
                    <div class="hotel-header">
                        <div class="hotel-name">${hotel.name}</div>
                        ${hotel.rating ? `<div class="hotel-rating">⭐ ${hotel.rating}</div>` : ''}
                    </div>

                    <div class="hotel-info-row">
                        <span class="icon">📍</span>
                        <span>${hotel.address}</span>
                    </div>

                    ${hotel.tel !== '暂无电话' ? `
                        <div class="hotel-info-row">
                            <span class="icon">📞</span>
                            <span>${hotel.tel}</span>
                        </div>
                    ` : ''}

                    ${hotel.business_area ? `
                        <div class="hotel-info-row">
                            <span class="icon">🏢</span>
                            <span>${hotel.business_area}</span>
                        </div>
                    ` : ''}

                    <div class="hotel-tags">
                        <span class="tag distance">📏 ${mapUtil.formatDistance(hotel.distance)}</span>
                        ${hotel.cost ? `<span class="tag cost">💰 ${hotel.cost}</span>` : ''}
                        ${hotel.cityname ? `<span class="tag">${hotel.cityname}</span>` : ''}
                        ${hotel.adname ? `<span class="tag">${hotel.adname}</span>` : ''}
                    </div>

                    <div class="hotel-actions">
                        <button class="btn-action" onclick="showOnMap(${index})">📍 地图</button>
                        ${hotel.tel !== '暂无电话' ? `<button class="btn-action" onclick="callHotel('${hotel.tel}')">📞 电话</button>` : ''}
                        ${hotel.website ? `<button class="btn-action" onclick="openWebsite('${hotel.website}')">🌐 官网</button>` : ''}
                    </div>
                </div>
            `;

            // 图片轮播功能
            if (hotel.photos && hotel.photos.length > 1) {
                setTimeout(() => {
                    const photosDiv = document.getElementById(`photos-${index}`);
                    const img = photosDiv.querySelector('img');
                    const dots = photosDiv.querySelectorAll('.photo-dot');

                    dots.forEach((dot, i) => {
                        dot.addEventListener('click', () => {
                            img.src = hotel.photos[i].url;
                            dots.forEach(d => d.classList.remove('active'));
                            dot.classList.add('active');
                        });
                    });
                }, 100);
            }

            return card;
        }

        // 显示统计信息
        function displayStats(hotels) {
            const statsBar = document.getElementById('stats-bar');
            statsBar.style.display = 'flex';

            const withPhotos = hotels.filter(h => h.photos && h.photos.length > 0).length;
            const withRating = hotels.filter(h => h.rating).length;
            const withCost = hotels.filter(h => h.cost).length;
            const avgDistance = hotels.reduce((sum, h) => sum + h.distance, 0) / hotels.length;

            statsBar.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${hotels.length}</div>
                    <div class="stat-label">找到酒店</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${withPhotos}</div>
                    <div class="stat-label">有图片</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${withRating}</div>
                    <div class="stat-label">有评分</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${withCost}</div>
                    <div class="stat-label">有价格</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${mapUtil.formatDistance(avgDistance)}</div>
                    <div class="stat-label">平均距离</div>
                </div>
            `;
        }

        // 在地图上添加标记
        function addMarkersToMap(hotels) {
            hotels.forEach((hotel, index) => {
                const marker = mapUtil.addMarker(
                    [hotel.location.lng, hotel.location.lat],
                    {
                        title: hotel.name,
                        icon: new mapUtil.AMap.Icon({
                            size: new mapUtil.AMap.Size(25, 34),
                            image: '//a.amap.com/jsapi_demos/static/demo-center/icons/poi-marker-red.png',
                            imageSize: new mapUtil.AMap.Size(25, 34)
                        })
                    }
                );

                marker.on('click', () => {
                    document.querySelectorAll('.hotel-card')[index].scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                });
            });
        }

        // 在地图上显示酒店
        window.showOnMap = function(index) {
            const hotel = currentHotels[index];
            mapUtil.setCenter([hotel.location.lng, hotel.location.lat], 16);
            document.getElementById('map-container').scrollIntoView({ behavior: 'smooth' });
        };

        // 拨打电话
        window.callHotel = function(tel) {
            window.location.href = `tel:${tel}`;
        };

        // 打开官网
        window.openWebsite = function(url) {
            window.open(url, '_blank');
        };

        // 使用当前位置
        window.useCurrentLocation = function() {
            if (!navigator.geolocation) {
                alert('您的浏览器不支持地理定位');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lng = position.coords.longitude;
                    const lat = position.coords.latitude;

                    document.getElementById('lng').value = lng;
                    document.getElementById('lat').value = lat;

                    currentCenter = [lng, lat];
                    mapUtil.setCenter(currentCenter, 14);

                    mapUtil.clearMarkers();
                    mapUtil.addMarker(currentCenter, {
                        title: '我的位置',
                        icon: new mapUtil.AMap.Icon({
                            size: new mapUtil.AMap.Size(30, 40),
                            image: '//a.amap.com/jsapi_demos/static/demo-center/icons/poi-marker-default.png',
                            imageSize: new mapUtil.AMap.Size(30, 40)
                        })
                    });

                    alert('已定位到您的当前位置');
                },
                (error) => {
                    alert('定位失败: ' + error.message);
                }
            );
        };

        // 页面加载时初始化
        initMap();
    </script>
</body>
</html>
