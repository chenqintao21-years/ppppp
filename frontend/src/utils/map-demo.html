<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高德地图功能演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: #00aa6c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: #008f5a;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        button.secondary {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
        }

        button.secondary:hover {
            background: #f7f7f7;
        }

        #map {
            width: 100%;
            height: 500px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .info-box {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #00aa6c;
        }

        .info-box h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-box p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin: 5px 0;
        }

        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .feature-item {
            padding: 15px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .feature-item h4 {
            color: #00aa6c;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .feature-item p {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ 高德地图功能演示</h1>
        <p class="subtitle">展示景点位置标记、附近推荐、路线规划和距离计算功能</p>

        <div class="controls">
            <button id="init-btn">初始化地图</button>
            <button id="nearby-btn" disabled>显示附近景点</button>
            <button id="route-btn" disabled>路线规划</button>
            <button id="distance-btn" disabled>计算距离</button>
            <button id="clear-btn" class="secondary" disabled>清除标记</button>
        </div>

        <div id="map"></div>

        <div class="info-box">
            <h3>📍 当前景点：巴黎卢浮宫博物馆</h3>
            <p><strong>地址：</strong>Rue de Rivoli, 75001 Paris, France</p>
            <p><strong>坐标：</strong>经度 2.3364, 纬度 48.8606</p>
            <p id="status">状态：等待初始化...</p>
        </div>

        <div class="feature-list">
            <div class="feature-item">
                <h4>✅ 景点位置标记</h4>
                <p>在地图上精确标记景点位置，支持自定义图标和信息窗体</p>
            </div>
            <div class="feature-item">
                <h4>🔍 附近推荐</h4>
                <p>搜索景点周边2公里内的其他景点，显示名称、地址和距离</p>
            </div>
            <div class="feature-item">
                <h4>🚗 路线规划</h4>
                <p>从当前位置到景点的驾车路线规划，显示距离和预计时间</p>
            </div>
            <div class="feature-item">
                <h4>📏 距离计算</h4>
                <p>计算任意两点之间的直线距离，支持米和公里单位转换</p>
            </div>
        </div>
    </div>

    <script type="module">
        import mapUtil from './map.js';

        const attractionData = {
            name: '巴黎卢浮宫博物馆',
            location: [2.3364, 48.8606],
            address: 'Rue de Rivoli, 75001 Paris, France'
        };

        const statusEl = document.getElementById('status');
        const initBtn = document.getElementById('init-btn');
        const nearbyBtn = document.getElementById('nearby-btn');
        const routeBtn = document.getElementById('route-btn');
        const distanceBtn = document.getElementById('distance-btn');
        const clearBtn = document.getElementById('clear-btn');

        // 初始化地图
        initBtn.addEventListener('click', async () => {
            try {
                initBtn.disabled = true;
                statusEl.textContent = '状态：正在初始化地图...';

                await mapUtil.initMap('map', {
                    center: attractionData.location,
                    zoom: 15
                });

                // 添加景点标记
                const marker = mapUtil.addMarker(attractionData.location, {
                    title: attractionData.name
                });

                mapUtil.addInfoWindow(marker, `
                    <div style="padding: 12px; min-width: 200px;">
                        <h3 style="margin: 0 0 8px 0; font-size: 16px; color: #333;">${attractionData.name}</h3>
                        <p style="margin: 0; color: #666; font-size: 13px;">${attractionData.address}</p>
                    </div>
                `);

                statusEl.textContent = '状态：地图初始化成功！';
                nearbyBtn.disabled = false;
                routeBtn.disabled = false;
                distanceBtn.disabled = false;
                clearBtn.disabled = false;
            } catch (error) {
                console.error('初始化失败:', error);
                statusEl.textContent = '状态：初始化失败 - ' + error.message;
                initBtn.disabled = false;
            }
        });

        // 显示附近景点
        nearbyBtn.addEventListener('click', async () => {
            try {
                nearbyBtn.disabled = true;
                statusEl.textContent = '状态：正在搜索附近景点...';

                const places = await mapUtil.searchNearby(
                    attractionData.location,
                    '景点',
                    { radius: 2000, pageSize: 10 }
                );

                places.forEach(place => {
                    const marker = mapUtil.addMarker(
                        [place.location.lng, place.location.lat],
                        { title: place.name }
                    );

                    const distance = mapUtil.calculateDistance(
                        attractionData.location,
                        [place.location.lng, place.location.lat]
                    );

                    mapUtil.addInfoWindow(marker, `
                        <div style="padding: 10px;">
                            <h4 style="margin: 0 0 5px 0;">${place.name}</h4>
                            <p style="margin: 0; color: #666; font-size: 12px;">${place.address || '暂无地址'}</p>
                            <p style="margin: 5px 0 0 0; color: #00aa6c; font-size: 12px;">
                                距离: ${mapUtil.formatDistance(distance)}
                            </p>
                        </div>
                    `);
                });

                mapUtil.fitView();
                statusEl.textContent = `状态：找到 ${places.length} 个附近景点`;
                nearbyBtn.disabled = false;
            } catch (error) {
                console.error('搜索失败:', error);
                statusEl.textContent = '状态：搜索失败 - ' + error.message;
                nearbyBtn.disabled = false;
            }
        });

        // 路线规划
        routeBtn.addEventListener('click', async () => {
            if (!navigator.geolocation) {
                alert('您的浏览器不支持定位功能');
                return;
            }

            routeBtn.disabled = true;
            statusEl.textContent = '状态：正在获取您的位置...';

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    try {
                        const userLocation = [position.coords.longitude, position.coords.latitude];
                        statusEl.textContent = '状态：正在规划路线...';

                        const result = await mapUtil.planRoute(userLocation, attractionData.location);

                        if (result.routes && result.routes.length > 0) {
                            const route = result.routes[0];
                            const distance = mapUtil.formatDistance(route.distance);
                            const duration = Math.round(route.time / 60);

                            statusEl.textContent = `状态：路线规划成功！距离 ${distance}，预计 ${duration} 分钟`;
                        }

                        routeBtn.disabled = false;
                    } catch (error) {
                        console.error('路线规划失败:', error);
                        statusEl.textContent = '状态：路线规划失败 - ' + error.message;
                        routeBtn.disabled = false;
                    }
                },
                (error) => {
                    console.error('定位失败:', error);
                    statusEl.textContent = '状态：无法获取位置，请检查定位权限';
                    routeBtn.disabled = false;
                }
            );
        });

        // 计算距离示例
        distanceBtn.addEventListener('click', () => {
            // 埃菲尔铁塔坐标
            const eiffelTower = [2.2945, 48.8584];
            const distance = mapUtil.calculateDistance(attractionData.location, eiffelTower);

            // 添加埃菲尔铁塔标记
            const marker = mapUtil.addMarker(eiffelTower, {
                title: '埃菲尔铁塔'
            });

            mapUtil.addInfoWindow(marker, `
                <div style="padding: 10px;">
                    <h4 style="margin: 0 0 5px 0;">埃菲尔铁塔</h4>
                    <p style="margin: 0; color: #00aa6c; font-size: 12px;">
                        距离卢浮宫: ${mapUtil.formatDistance(distance)}
                    </p>
                </div>
            `);

            mapUtil.fitView();
            statusEl.textContent = `状态：卢浮宫到埃菲尔铁塔的距离为 ${mapUtil.formatDistance(distance)}`;
        });

        // 清除标记
        clearBtn.addEventListener('click', () => {
            mapUtil.clearMarkers();

            // 重新添加主景点标记
            const marker = mapUtil.addMarker(attractionData.location, {
                title: attractionData.name
            });

            mapUtil.addInfoWindow(marker, `
                <div style="padding: 12px; min-width: 200px;">
                    <h3 style="margin: 0 0 8px 0; font-size: 16px; color: #333;">${attractionData.name}</h3>
                    <p style="margin: 0; color: #666; font-size: 13px;">${attractionData.address}</p>
                </div>
            `);

            mapUtil.setCenter(attractionData.location, 15);
            statusEl.textContent = '状态：已清除所有标记';
        });
    </script>
</body>
</html>
