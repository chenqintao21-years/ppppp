<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐厅详情 - TripAdvisor</title>
    <link rel="stylesheet" href="../styles/base/styles.css">
    <link rel="stylesheet" href="../styles/pages/restaurant-detail.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header" id="header">
        <div class="header-scrolled" id="headerScrolled">
            <div class="container">
                <nav class="navbar-scrolled">
                    <div class="logo">
                        <a href="index.html">
                            <svg width="166" height="28" viewBox="0 0 166 28">
                                <path d="M14 0C6.3 0 0 6.3 0 14s6.3 14 14 14 14-6.3 14-14S21.7 0 14 0zm0 25c-6.1 0-11-4.9-11-11S7.9 3 14 3s11 4.9 11 11-4.9 11-11 11z" fill="#00AA6C"/>
                                <circle cx="9" cy="14" r="3.5" fill="#00AA6C"/>
                                <circle cx="19" cy="14" r="3.5" fill="#00AA6C"/>
                                <text x="32" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#000">Tripadvisor</text>
                            </svg>
                        </a>
                    </div>
                    <div class="search-bar-compact">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input type="text" placeholder="搜索" class="search-input-compact">
                    </div>
                    <div class="nav-tabs">
                        <a href="hotel-page.html" class="nav-tab">酒店</a>
                        <a href="attractions.html" class="nav-tab">景点玩乐</a>
                        <a href="restaurant.html" class="nav-tab active">美食</a>
                        <a href="#" class="nav-tab">游船</a>
                    </div>
                    <div class="nav-right">
                        <a href="#" class="nav-link">发现</a>
                        <a href="#" class="nav-link">点评</a>
                        <button class="icon-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="2" y1="12" x2="22" y2="12"></line>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                            </svg>
                        </button>
                        <span class="currency">USD</span>
                        <button class="avatar-btn">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ff6b6b'/%3E%3C/svg%3E" alt="avatar">
                        </button>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="main-content">
        <div class="container">
            <!-- 面包屑导航 -->
            <nav class="breadcrumb">
                <button class="back-button" onclick="window.history.length > 1 ? window.history.back() : window.location.href='index.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    <span>返回</span>
                </button>
                <a href="index.html">首页</a>
                <span>›</span>
                <a href="restaurant-search.html" id="breadcrumbCity">美食</a>
                <span>›</span>
                <span id="restaurantName">餐厅名称</span>
            </nav>

            <!-- 餐厅头部信息 -->
            <section class="restaurant-header">
                <div class="header-left">
                    <h1 id="restaurantTitle">餐厅名称</h1>
                    <div class="rating-section">
                        <div class="rating-circles" id="ratingCircles"></div>
                        <span class="rating-score" id="ratingScore">4.5</span>
                        <span class="review-count" id="reviewCount">1,234 条点评</span>
                    </div>
                    <div class="restaurant-meta">
                        <span class="meta-item" id="cuisineType">加载中...</span>
                        <span class="meta-item" id="priceRange">¥¥ - ¥¥¥</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn-save">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                        </svg>
                        保存
                    </button>
                    <button class="btn-share">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="5" r="3"></circle>
                            <circle cx="6" cy="12" r="3"></circle>
                            <circle cx="18" cy="19" r="3"></circle>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                        </svg>
                        分享
                    </button>
                </div>
            </section>

            <!-- 图片画廊 -->
            <section class="photo-gallery">
                <div class="main-photo">
                    <img id="mainPhoto" src="https://picsum.photos/800/500?random=1" alt="餐厅照片">
                </div>
                <div class="photo-grid">
                    <img src="https://picsum.photos/400/300?random=2" alt="照片">
                    <img src="https://picsum.photos/400/300?random=3" alt="照片">
                    <img src="https://picsum.photos/400/300?random=4" alt="照片">
                    <img src="https://picsum.photos/400/300?random=5" alt="照片">
                </div>
                <button class="view-all-photos">查看所有照片</button>
            </section>

            <!-- 内容区域 -->
            <div class="content-wrapper">
                <!-- 左侧主要内容 -->
                <div class="main-column">
                    <!-- 关于餐厅 -->
                    <section class="section about-section">
                        <h2>关于</h2>
                        <p id="restaurantDescription">
                            加载中...
                        </p>
                    </section>

                    <!-- 详细信息 -->
                    <section class="section details-section">
                        <h2>详细信息</h2>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <span class="detail-label">菜系</span>
                                <span class="detail-value" id="detailCuisine">加载中...</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">特色</span>
                                <span class="detail-value" id="detailFeatures">户外座位, 免费WiFi, 接受预订</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">用餐时段</span>
                                <span class="detail-value">午餐, 晚餐</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">价格区间</span>
                                <span class="detail-value" id="detailPrice">¥50 - ¥150</span>
                            </div>
                        </div>
                    </section>

                    <!-- 评分详情 -->
                    <section class="section ratings-section">
                        <h2>评分和点评</h2>
                        <div class="ratings-overview">
                            <div class="rating-bars" id="ratingBarsContainer">
                                <!-- 评分条将通过JavaScript动态加载 -->
                            </div>
                        </div>
                    </section>

                    <!-- 用户点评 -->
                    <section class="section reviews-section">
                        <h2>点评</h2>
                        <div id="reviewsContainer" class="reviews-list">
                            <!-- 点评将通过JavaScript动态加载 -->
                        </div>
                        <button class="load-more-reviews">加载更多点评</button>
                    </section>
                </div>

                <!-- 右侧边栏 -->
                <aside class="sidebar-column">
                    <!-- 联系信息卡片 -->
                    <div class="info-card">
                        <h3>联系方式</h3>
                        <div class="info-item">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            <span id="restaurantAddress">加载中...</span>
                        </div>
                        <div class="info-item">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                            </svg>
                            <span id="restaurantPhone">0773-1234567</span>
                        </div>
                        <div class="info-item">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            <span id="restaurantHours">11:00 - 22:00</span>
                        </div>
                        <button class="btn-primary btn-full">查看地图</button>
                    </div>

                    <!-- 预订卡片 -->
                    <div class="info-card">
                        <h3>在线预订</h3>
                        <p class="card-description">提前预订，确保有位</p>
                        <button class="btn-primary btn-full">立即预订</button>
                    </div>

                    <!-- 附近推荐 -->
                    <div class="info-card">
                        <h3>附近推荐</h3>
                        <div class="nearby-list" id="nearbyRestaurantsContainer">
                            <!-- 附近餐厅将通过JavaScript动态加载 -->
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024 TripAdvisor. 保留所有权利。</p>
                <div class="footer-links">
                    <a href="#">关于我们</a>
                    <a href="#">隐私政策</a>
                    <a href="#">使用条款</a>
                    <a href="#">联系我们</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../pages/restaurants/detail.js"></script>
</body>
</html>
