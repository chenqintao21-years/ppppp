<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - Tripadvisor</title>
    <link rel="stylesheet" href="../styles/base/styles.css">
    <link rel="stylesheet" href="../styles/pages/profile.css">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="container">
                <nav class="navbar">
                    <a href="index.html" class="logo">
                        <svg width="166" height="28" viewBox="0 0 166 28">
                            <path d="M14 0C6.3 0 0 6.3 0 14s6.3 14 14 14 14-6.3 14-14S21.7 0 14 0zm0 25c-6.1 0-11-4.9-11-11S7.9 3 14 3s11 4.9 11 11-4.9 11-11 11z" fill="#00AA6C"/>
                            <circle cx="9" cy="14" r="3.5" fill="#00AA6C"/>
                            <circle cx="19" cy="14" r="3.5" fill="#00AA6C"/>
                            <text x="32" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#000">Tripadvisor</text>
                        </svg>
                    </a>
                    <div class="nav-links">
                        <a href="index.html">首页</a>
                        <a href="attractions.html">景点玩乐</a>
                        <a href="restaurant.html">美食</a>
                        <a href="hotel-page.html">酒店</a>
                    </div>
                    <div class="nav-actions">
                        <a href="my-bookings.html" class="nav-link">我的预订</a>
                        <a href="favorites.html" class="nav-link">收藏</a>
                        <div class="user-menu">
                            <button class="user-btn" id="userMenuBtn">
                                <img src="" alt="用户头像" class="user-avatar" id="headerAvatar">
                                <span id="headerUsername">用户</span>
                            </button>
                            <div class="user-dropdown" id="userDropdown">
                                <a href="profile.html" class="dropdown-item active">个人资料</a>
                                <a href="my-bookings.html" class="dropdown-item">我的预订</a>
                                <a href="favorites.html" class="dropdown-item">我的收藏</a>
                                <a href="my-reviews.html" class="dropdown-item">我的点评</a>
                                <div class="dropdown-divider"></div>
                                <a href="#" class="dropdown-item" id="logoutBtn">退出登录</a>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main class="profile-main">
        <div class="container">
            <button class="back-button" onclick="window.history.length > 1 ? window.history.back() : window.location.href='index.html'" style="margin-bottom: 20px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回</span>
            </button>
            <div class="profile-layout">
                <!-- 侧边栏 -->
                <aside class="profile-sidebar">
                    <nav class="sidebar-nav">
                        <a href="profile.html" class="sidebar-link active">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            个人资料
                        </a>
                        <a href="my-bookings.html" class="sidebar-link">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            我的预订
                        </a>
                        <a href="favorites.html" class="sidebar-link">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            我的收藏
                        </a>
                        <a href="my-reviews.html" class="sidebar-link">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                            我的点评
                        </a>
                    </nav>
                </aside>

                <!-- 主内容区 -->
                <div class="profile-content">
                    <div class="profile-header">
                        <h1>个人资料</h1>
                        <p>管理您的个人信息和账户设置</p>
                    </div>

                    <!-- 头像部分 -->
                    <div class="profile-card">
                        <h2 class="card-title">头像</h2>
                        <div class="avatar-section">
                            <div class="avatar-preview">
                                <img src="" alt="用户头像" id="avatarPreview">
                            </div>
                            <div class="avatar-actions">
                                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                                <button class="btn btn-primary" id="uploadAvatarBtn">上传新头像</button>
                                <p class="avatar-hint">支持 JPG、PNG 格式，文件大小不超过 5MB</p>
                            </div>
                        </div>
                    </div>

                    <!-- 基本信息 -->
                    <div class="profile-card">
                        <div class="card-header">
                            <h2 class="card-title">基本信息</h2>
                            <button class="btn btn-text" id="editProfileBtn">编辑</button>
                        </div>
                        <form id="profileForm" class="profile-form">
                            <div class="form-group">
                                <label for="username" class="form-label">用户名</label>
                                <input type="text" id="username" name="username" class="form-input" readonly>
                            </div>
                            <div class="form-group">
                                <label for="email" class="form-label">邮箱</label>
                                <input type="email" id="email" name="email" class="form-input" readonly>
                            </div>
                            <div class="form-group">
                                <label class="form-label">注册时间</label>
                                <input type="text" id="createdAt" class="form-input" readonly>
                            </div>
                            <div class="form-actions" id="profileFormActions" style="display: none;">
                                <button type="submit" class="btn btn-primary">保存更改</button>
                                <button type="button" class="btn btn-secondary" id="cancelEditBtn">取消</button>
                            </div>
                        </form>
                    </div>

                    <!-- 修改密码 -->
                    <div class="profile-card">
                        <h2 class="card-title">修改密码</h2>
                        <form id="passwordForm" class="profile-form">
                            <div class="form-group">
                                <label for="currentPassword" class="form-label">当前密码</label>
                                <input type="password" id="currentPassword" name="currentPassword" class="form-input" placeholder="请输入当前密码">
                                <span class="form-error" id="currentPasswordError"></span>
                            </div>
                            <div class="form-group">
                                <label for="newPassword" class="form-label">新密码</label>
                                <input type="password" id="newPassword" name="newPassword" class="form-input" placeholder="请输入新密码（至少8位）">
                                <span class="form-error" id="newPasswordError"></span>
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword" class="form-label">确认新密码</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="请再次输入新密码">
                                <span class="form-error" id="confirmPasswordError"></span>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">修改密码</button>
                            </div>
                        </form>
                    </div>

                    <!-- 账户统计 -->
                    <div class="profile-card">
                        <h2 class="card-title">账户统计</h2>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-icon">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                        <line x1="16" y1="2" x2="16" y2="6"></line>
                                        <line x1="8" y1="2" x2="8" y2="6"></line>
                                        <line x1="3" y1="10" x2="21" y2="10"></line>
                                    </svg>
                                </div>
                                <div class="stat-info">
                                    <div class="stat-value" id="bookingsCount">0</div>
                                    <div class="stat-label">预订记录</div>
                                </div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-icon">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                    </svg>
                                </div>
                                <div class="stat-info">
                                    <div class="stat-value" id="favoritesCount">0</div>
                                    <div class="stat-label">收藏数量</div>
                                </div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-icon">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                    </svg>
                                </div>
                                <div class="stat-info">
                                    <div class="stat-value" id="reviewsCount">0</div>
                                    <div class="stat-label">发布点评</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Tripadvisor. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="../pages/profile/profile.js"></script>
</body>
</html>
