<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录调试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background: #00AA6C;
            color: white;
            border: none;
            cursor: pointer;
        }
        .log {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            max-height: 300px;
            overflow-y: auto;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
    </style>
</head>
<body>
    <h1>登录调试页面</h1>

    <form id="loginForm">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="email" value="test@example.com">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" value="password123">
        </div>
        <button type="submit">登录</button>
    </form>

    <div class="log" id="log"></div>

    <script type="module">
        const log = document.getElementById('log');

        function addLog(message, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            console.log(message);
        }

        addLog('页面加载完成');

        // 测试导入
        try {
            addLog('开始导入 auth.js...');
            const authModule = await import('../services/auth.js');
            addLog('auth.js 导入成功');
            addLog('authService: ' + (authModule.authService ? '存在' : '不存在'));
            addLog('validateEmail: ' + (authModule.validateEmail ? '存在' : '不存在'));

            const { authService, validateEmail } = authModule;

            // 表单提交
            const form = document.getElementById('loginForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                addLog('表单提交事件触发');

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                addLog('邮箱: ' + email);
                addLog('密码: ' + password);

                // 验证邮箱
                if (!validateEmail(email)) {
                    addLog('邮箱格式无效', 'error');
                    return;
                }
                addLog('邮箱验证通过');

                // 调用登录
                try {
                    addLog('开始调用 authService.login...');
                    const result = await authService.login(email, password, false);
                    addLog('登录响应: ' + JSON.stringify(result), 'success');

                    if (result.success) {
                        addLog('登录成功！', 'success');
                        addLog('Token: ' + authService.getToken());
                        addLog('User: ' + JSON.stringify(authService.getUser()));
                    } else {
                        addLog('登录失败: ' + result.message, 'error');
                    }
                } catch (error) {
                    addLog('登录异常: ' + error.message, 'error');
                    addLog('错误堆栈: ' + error.stack, 'error');
                }
            });

            addLog('事件监听器已添加');

        } catch (error) {
            addLog('导入失败: ' + error.message, 'error');
            addLog('错误堆栈: ' + error.stack, 'error');
        }
    </script>
</body>
</html>
