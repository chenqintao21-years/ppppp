<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食 - Tripadvisor</title>
    <link rel="stylesheet" href="../styles/pages/restaurant.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header header-top">
        <div class="header-container">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit;">
                    <svg width="32" height="32" viewBox="0 0 32 32">
                        <circle cx="10" cy="16" r="8" fill="none" stroke="#000" stroke-width="2"/>
                        <circle cx="22" cy="16" r="8" fill="none" stroke="#000" stroke-width="2"/>
                        <circle cx="10" cy="16" r="3" fill="#000"/>
                        <circle cx="22" cy="16" r="3" fill="#000"/>
                    </svg>
                    <span class="logo-text">Tripadvisor</span>
                </a>
            </div>

            <div class="search-bar">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
                </svg>
                <input type="text" placeholder="搜索" class="search-input">
            </div>

        </div>
    </header>

    <!-- 二级导航 -->
    <nav class="sub-nav">
        <button class="back-button" onclick="window.history.length > 1 ? window.history.back() : window.location.href='index.html'" style="margin-left: 24px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            <span>返回</span>
        </button>
        <a href="hotel-page.html" class="sub-nav-link">酒店</a>
        <a href="attractions.html" class="sub-nav-link">景点玩乐</a>
        <a href="restaurant.html" class="sub-nav-link active">美食</a>
        <a href="#" class="sub-nav-link">游船</a>
    </nav>

    <!-- 滚动时显示的导航栏 -->
    <div class="header-scrolled">
        <div class="container">
            <nav class="navbar-scrolled">
                <div class="logo">
                    <a href="index.html">
                        <svg width="166" height="28" viewBox="0 0 166 28">
                            <path d="M14 0C6.3 0 0 6.3 0 14s6.3 14 14 14 14-6.3 14-14S21.7 0 14 0zm0 25c-6.1 0-11-4.9-11-11S7.9 3 14 3s11 4.9 11 11-4.9 11-11 11z" fill="#00AA6C"/>
                            <circle cx="9" cy="14" r="3.5" fill="#00AA6C"/>
                            <circle cx="19" cy="14" r="3.5" fill="#00AA6C"/>
                            <text x="32" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#000">Tripadvisor</text>
                        </svg>
                    </a>
                </div>
                <div class="search-bar-compact">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" placeholder="搜索" class="search-input-compact">
                </div>
                <div class="nav-tabs">
                    <a href="hotel-page.html" class="nav-tab">酒店</a>
                    <a href="attractions.html" class="nav-tab">景点玩乐</a>
                    <a href="restaurant.html" class="nav-tab active">美食</a>
                    <a href="#" class="nav-tab">游船</a>
                </div>
                <div class="nav-right">
                    <a href="#" class="nav-link">发现</a>
                    <a href="#" class="nav-link">点评</a>
                    <button class="icon-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        </svg>
                    </button>
                    <span class="currency">USD</span>
                    <div class="auth-buttons">
                        <a href="login.html" class="auth-link-btn">登录</a>
                        <a href="register.html" class="auth-link-btn register">注册</a>
                    </div>
                </div>
            </nav>
        </div>
    </div>

    <!-- 主要内容区 -->
    <main class="main-content">
        <div class="hero-section">
            <div class="search-container">
                <div class="search-box" id="searchBox">
                    <svg class="search-icon-large" width="24" height="24" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
                    </svg>
                    <input type="text" placeholder="城市、餐厅名称等" class="search-input-large" id="searchInput">
                </div>
                <h1 class="hero-title">寻找您心中的完美餐厅</h1>
            </div>
        </div>

        <!-- 搜索建议面板 -->
        <div class="search-suggestions" id="searchSuggestions">
            <div class="suggestions-content">
                <div class="suggestion-section">
                    <div class="suggestion-header">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="currentColor"/>
                        </svg>
                        <span>附近</span>
                    </div>
                </div>

                <div class="suggestion-item featured">
                    <img src="https://via.placeholder.com/60x60" alt="巴黎家庭游" class="suggestion-image">
                    <div class="suggestion-info">
                        <div class="suggestion-title">巴黎家庭游：乐趣满满的 5 日行程</div>
                        <div class="suggestion-subtitle">Dina Maiyana</div>
                    </div>
                </div>

                <div class="suggestion-section">
                    <div class="section-title">热门目的地</div>
                </div>

                <div class="suggestion-item" data-location="上海">
                    <img src="https://via.placeholder.com/60x60" alt="上海" class="suggestion-image">
                    <div class="suggestion-info">
                        <div class="suggestion-title">上海</div>
                        <div class="suggestion-subtitle">中国</div>
                    </div>
                </div>

                <div class="suggestion-item" data-location="曼谷">
                    <img src="https://via.placeholder.com/60x60" alt="曼谷" class="suggestion-image">
                    <div class="suggestion-info">
                        <div class="suggestion-title">曼谷</div>
                        <div class="suggestion-subtitle">亚洲泰国</div>
                    </div>
                </div>

                <div class="suggestion-item" data-location="上海">
                    <img src="https://via.placeholder.com/60x60" alt="上海" class="suggestion-image">
                    <div class="suggestion-info">
                        <div class="suggestion-title">上海</div>
                        <div class="suggestion-subtitle">中国</div>
                    </div>
                </div>

                <div class="suggestion-item" data-location="成都">
                    <img src="https://via.placeholder.com/60x60" alt="成都" class="suggestion-image">
                    <div class="suggestion-info">
                        <div class="suggestion-title">成都</div>
                        <div class="suggestion-subtitle">中国四川</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <svg width="32" height="32" viewBox="0 0 32 32">
                    <circle cx="10" cy="16" r="8" fill="none" stroke="#000" stroke-width="2"/>
                    <circle cx="22" cy="16" r="8" fill="none" stroke="#000" stroke-width="2"/>
                    <circle cx="10" cy="16" r="3" fill="#000"/>
                    <circle cx="22" cy="16" r="3" fill="#000"/>
                </svg>
            </div>
            <div class="footer-info">
                <p>© 2026 Tripadvisor LLC 保留所有权利。</p>
                <div class="footer-links">
                    <a href="#">使用条款</a>
                    <a href="#">隐私和 Cookie 声明</a>
                    <a href="#">同意使用 Cookie</a>
                    <a href="#">网站工作理</a>
                    <a href="#">联系我们</a>
                    <a href="#">无障碍声明</a>
                </div>
                <p class="footer-note">网站的此版本通常面向中文使用者，除非有针对其国家或地区的特定网站版本存在。您可以使用下拉式菜单访问 Tripadvisor 网站面向特定国家或地区的其他版本。</p>
                <button class="footer-expand">阅读更多</button>
            </div>
            <div class="footer-selectors">
                <select class="footer-select">
                    <option>US$ USD</option>
                </select>
                <select class="footer-select">
                    <option>中文国际版</option>
                </select>
            </div>
        </div>
    </footer>

    <script type="module">
        // 自动定位并导入城市数据（已禁用）
        import { initAutoLocationImport } from '../services/autoLocationImport.js';

        // 页面加载时自动执行（已禁用）
        // initAutoLocationImport({ autoStart: true, silent: false });

        // 监听城市数据导入完成事件
        window.addEventListener('cityDataImported', (event) => {
            const { city, data } = event.detail;
            console.log('城市数据已导入:', city, data);

            // 更新搜索框
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.value = city;
            }

            // 可以在这里添加重新加载餐厅数据的逻辑
        });
    </script>
    <script src="../pages/restaurants/list.js"></script>
</body>
</html>
