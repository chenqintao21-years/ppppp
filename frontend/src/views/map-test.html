<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图功能测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: #00aa6c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: #008f5a;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #map {
            width: 100%;
            height: 500px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .status {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #00aa6c;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ 高德地图功能测试</h1>

        <div class="controls">
            <button id="init-btn">初始化地图</button>
            <button id="nearby-btn" disabled>显示附近景点</button>
            <button id="route-btn" disabled>路线规划</button>
            <button id="distance-btn" disabled>计算距离</button>
        </div>

        <div id="map"></div>

        <div class="status" id="status">
            状态：等待初始化...
        </div>
    </div>

    <script>
        // 高德地图安全密钥配置
        window._AMapSecurityConfig = {
            securityJsCode: '28cda766a6399e06cfeacca6dc9bd4c1'
        };

        // 高德地图工具类（内联版本）
        class AMapUtil {
            constructor(key) {
                this.key = key;
                this.map = null;
                this.AMap = null;
                this.markers = [];
            }

            async loadMapScript() {
                if (window.AMap) {
                    this.AMap = window.AMap;
                    return Promise.resolve(window.AMap);
                }

                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = `https://webapi.amap.com/maps?v=2.0&key=${this.key}&plugin=AMap.Geocoder,AMap.Driving,AMap.PlaceSearch`;
                    script.async = true;
                    script.onload = () => {
                        this.AMap = window.AMap;
                        resolve(window.AMap);
                    };
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
            }

            async initMap(containerId, options = {}) {
                await this.loadMapScript();

                const defaultOptions = {
                    zoom: 15,
                    center: [2.3364, 48.8606],
                    viewMode: '3D',
                    pitch: 0,
                    ...options
                };

                this.map = new this.AMap.Map(containerId, defaultOptions);
                return this.map;
            }

            addMarker(position, options = {}) {
                if (!this.map) {
                    console.error('地图未初始化');
                    return null;
                }

                const marker = new this.AMap.Marker({
                    position: position,
                    title: options.title || '',
                    icon: options.icon,
                    ...options
                });

                marker.setMap(this.map);
                this.markers.push(marker);

                if (options.onClick) {
                    marker.on('click', options.onClick);
                }

                return marker;
            }

            addInfoWindow(marker, content) {
                const infoWindow = new this.AMap.InfoWindow({
                    content: content,
                    offset: new this.AMap.Pixel(0, -30)
                });

                marker.on('click', () => {
                    infoWindow.open(this.map, marker.getPosition());
                });

                return infoWindow;
            }

            clearMarkers() {
                this.markers.forEach(marker => {
                    marker.setMap(null);
                });
                this.markers = [];
            }

            calculateDistance(point1, point2) {
                if (!this.AMap) return 0;

                const p1 = new this.AMap.LngLat(point1[0], point1[1]);
                const p2 = new this.AMap.LngLat(point2[0], point2[1]);
                return p1.distance(p2);
            }

            formatDistance(distance) {
                if (distance < 1000) {
                    return `${Math.round(distance)}米`;
                } else {
                    return `${(distance / 1000).toFixed(1)}公里`;
                }
            }

            async planRoute(start, end, options = {}) {
                return new Promise((resolve, reject) => {
                    const driving = new this.AMap.Driving({
                        map: this.map,
                        panel: options.panel,
                        hideMarkers: options.hideMarkers || false,
                        ...options
                    });

                    driving.search(start, end, (status, result) => {
                        if (status === 'complete') {
                            resolve(result);
                        } else {
                            reject(new Error('路线规划失败'));
                        }
                    });
                });
            }

            async searchNearby(center, keyword, options = {}) {
                return new Promise((resolve, reject) => {
                    const placeSearch = new this.AMap.PlaceSearch({
                        type: options.type || '',
                        pageSize: options.pageSize || 10,
                        pageIndex: options.pageIndex || 1,
                        city: options.city || '全国',
                        citylimit: options.citylimit || false
                    });

                    placeSearch.searchNearBy(keyword, center, options.radius || 5000, (status, result) => {
                        if (status === 'complete') {
                            resolve(result.poiList.pois);
                        } else {
                            reject(new Error('搜索失败'));
                        }
                    });
                });
            }

            setCenter(lnglat, zoom) {
                if (this.map) {
                    this.map.setCenter(lnglat);
                    if (zoom) {
                        this.map.setZoom(zoom);
                    }
                }
            }

            fitView() {
                if (this.map && this.markers.length > 0) {
                    this.map.setFitView();
                }
            }
        }

        // 初始化
        const mapUtil = new AMapUtil('987e520a1fb34f1680b515ff7ceb572e');
        const attractionData = {
            name: '巴黎卢浮宫博物馆',
            location: [2.3364, 48.8606],
            address: 'Rue de Rivoli, 75001 Paris, France'
        };

        const statusEl = document.getElementById('status');
        const initBtn = document.getElementById('init-btn');
        const nearbyBtn = document.getElementById('nearby-btn');
        const routeBtn = document.getElementById('route-btn');
        const distanceBtn = document.getElementById('distance-btn');

        // 初始化地图
        initBtn.addEventListener('click', async () => {
            try {
                initBtn.disabled = true;
                statusEl.textContent = '状态：正在加载高德地图 API...';

                await mapUtil.initMap('map', {
                    center: attractionData.location,
                    zoom: 15
                });

                statusEl.textContent = '状态：正在添加景点标记...';

                const marker = mapUtil.addMarker(attractionData.location, {
                    title: attractionData.name
                });

                mapUtil.addInfoWindow(marker, `
                    <div style="padding: 12px; min-width: 200px;">
                        <h3 style="margin: 0 0 8px 0; font-size: 16px; color: #333;">${attractionData.name}</h3>
                        <p style="margin: 0; color: #666; font-size: 13px;">${attractionData.address}</p>
                    </div>
                `);

                statusEl.textContent = '状态：✅ 地图初始化成功！点击标记查看信息';
                nearbyBtn.disabled = false;
                routeBtn.disabled = false;
                distanceBtn.disabled = false;
            } catch (error) {
                console.error('初始化失败:', error);
                statusEl.textContent = '状态：❌ 初始化失败 - ' + error.message;
                initBtn.disabled = false;
            }
        });

        // 显示附近景点
        nearbyBtn.addEventListener('click', async () => {
            try {
                nearbyBtn.disabled = true;
                statusEl.textContent = '状态：正在搜索附近景点...';

                const places = await mapUtil.searchNearby(
                    attractionData.location,
                    '景点',
                    { radius: 2000, pageSize: 10 }
                );

                places.forEach(place => {
                    const marker = mapUtil.addMarker(
                        [place.location.lng, place.location.lat],
                        { title: place.name }
                    );

                    const distance = mapUtil.calculateDistance(
                        attractionData.location,
                        [place.location.lng, place.location.lat]
                    );

                    mapUtil.addInfoWindow(marker, `
                        <div style="padding: 10px;">
                            <h4 style="margin: 0 0 5px 0;">${place.name}</h4>
                            <p style="margin: 0; color: #666; font-size: 12px;">${place.address || '暂无地址'}</p>
                            <p style="margin: 5px 0 0 0; color: #00aa6c; font-size: 12px;">
                                距离: ${mapUtil.formatDistance(distance)}
                            </p>
                        </div>
                    `);
                });

                mapUtil.fitView();
                statusEl.textContent = `状态：✅ 找到 ${places.length} 个附近景点，点击标记查看详情`;
                nearbyBtn.disabled = false;
            } catch (error) {
                console.error('搜索失败:', error);
                statusEl.textContent = '状态：❌ 搜索失败 - ' + error.message;
                nearbyBtn.disabled = false;
            }
        });

        // 路线规划
        routeBtn.addEventListener('click', async () => {
            if (!navigator.geolocation) {
                alert('您的浏览器不支持定位功能');
                return;
            }

            routeBtn.disabled = true;
            statusEl.textContent = '状态：正在获取您的位置...';

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    try {
                        const userLocation = [position.coords.longitude, position.coords.latitude];
                        statusEl.textContent = '状态：正在规划路线...';

                        const result = await mapUtil.planRoute(userLocation, attractionData.location);

                        if (result.routes && result.routes.length > 0) {
                            const route = result.routes[0];
                            const distance = mapUtil.formatDistance(route.distance);
                            const duration = Math.round(route.time / 60);

                            statusEl.textContent = `状态：✅ 路线规划成功！距离 ${distance}，预计 ${duration} 分钟`;
                        }

                        routeBtn.disabled = false;
                    } catch (error) {
                        console.error('路线规划失败:', error);
                        statusEl.textContent = '状态：❌ 路线规划失败 - ' + error.message;
                        routeBtn.disabled = false;
                    }
                },
                (error) => {
                    console.error('定位失败:', error);
                    statusEl.textContent = '状态：❌ 无法获取位置，请检查定位权限';
                    routeBtn.disabled = false;
                }
            );
        });

        // 计算距离
        distanceBtn.addEventListener('click', () => {
            const eiffelTower = [2.2945, 48.8584];
            const distance = mapUtil.calculateDistance(attractionData.location, eiffelTower);

            const marker = mapUtil.addMarker(eiffelTower, {
                title: '埃菲尔铁塔'
            });

            mapUtil.addInfoWindow(marker, `
                <div style="padding: 10px;">
                    <h4 style="margin: 0 0 5px 0;">埃菲尔铁塔</h4>
                    <p style="margin: 0; color: #00aa6c; font-size: 12px;">
                        距离卢浮宫: ${mapUtil.formatDistance(distance)}
                    </p>
                </div>
            `);

            mapUtil.fitView();
            statusEl.textContent = `状态：✅ 卢浮宫到埃菲尔铁塔的距离为 ${mapUtil.formatDistance(distance)}`;
        });
    </script>
</body>
</html>
