<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的点评 - Tripadvisor</title>
    <link rel="stylesheet" href="../styles/base/styles.css">
    <link rel="stylesheet" href="../styles/pages/profile.css">
    <link rel="stylesheet" href="../styles/pages/reviews.css">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="container">
                <nav class="navbar">
                    <a href="index.html" class="logo">
                        <svg width="166" height="28" viewBox="0 0 166 28">
                            <path d="M14 0C6.3 0 0 6.3 0 14s6.3 14 14 14 14-6.3 14-14S21.7 0 14 0zm0 25c-6.1 0-11-4.9-11-11S7.9 3 14 3s11 4.9 11 11-4.9 11-11 11z" fill="#00AA6C"/>
                            <circle cx="9" cy="14" r="3.5" fill="#00AA6C"/>
                            <circle cx="19" cy="14" r="3.5" fill="#00AA6C"/>
                            <text x="32" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#000">Tripadvisor</text>
                        </svg>
                    </a>
                    <div class="nav-links">
                        <a href="index.html">首页</a>
                        <a href="attractions.html">景点玩乐</a>
                        <a href="restaurant.html">美食</a>
                        <a href="hotel-page.html">酒店</a>
                    </div>
                    <div class="nav-actions">
                        <a href="my-bookings.html" class="nav-link">我的预订</a>
                        <a href="favorites.html" class="nav-link">收藏</a>
                        <div class="user-menu">
                            <button class="user-btn" id="userMenuBtn">
                                <img src="" alt="用户头像" class="user-avatar" id="headerAvatar">
                                <span id="headerUsername">用户</span>
                            </button>
                            <div class="user-dropdown" id="userDropdown">
                                <a href="profile.html" class="dropdown-item">个人资料</a>
                                <a href="my-bookings.html" class="dropdown-item">我的预订</a>
                                <a href="favorites.html" class="dropdown-item">我的收藏</a>
                                <a href="my-reviews.html" class="dropdown-item active">我的点评</a>
                                <div class="dropdown-divider"></div>
                                <a href="#" class="dropdown-item" id="logoutBtn">退出登录</a>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main class="profile-main">
        <div class="container">
            <button class="back-button" onclick="window.history.length > 1 ? window.history.back() : window.location.href='index.html'" style="margin-bottom: 20px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回</span>
            </button>
            <div class="profile-layout">
                <!-- 侧边栏 -->
                <aside class="profile-sidebar">
                    <nav class="sidebar-nav">
                        <a href="profile.html" class="sidebar-link">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            个人资料
                        </a>
                        <a href="my-bookings.html" class="sidebar-link">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            我的预订
                        </a>
                        <a href="favorites.html" class="sidebar-link">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            我的收藏
                        </a>
                        <a href="my-reviews.html" class="sidebar-link active">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                            我的点评
                        </a>
                    </nav>
                </aside>

                <!-- 主内容区 -->
                <div class="profile-content">
                    <div class="profile-header">
                        <h1>我的点评</h1>
                        <p>管理您发布的所有点评</p>
                    </div>

                    <!-- 筛选器 -->
                    <div class="reviews-filters">
                        <button class="filter-tab active" data-type="">全部</button>
                        <button class="filter-tab" data-type="attraction">景点</button>
                        <button class="filter-tab" data-type="restaurant">餐厅</button>
                        <button class="filter-tab" data-type="hotel">酒店</button>
                    </div>

                    <!-- 点评列表 -->
                    <div id="reviewsList" class="reviews-list">
                        <!-- 加载中 -->
                        <div class="loading-state">
                            <div class="spinner"></div>
                            <p>加载中...</p>
                        </div>
                    </div>

                    <!-- 空状态 -->
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <h3>暂无点评</h3>
                        <p>您还没有发布任何点评，快去分享您的体验吧！</p>
                        <a href="index.html" class="btn btn-primary">开始探索</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 编辑点评弹窗 -->
    <div id="editModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>编辑点评</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editReviewForm">
                    <div class="form-group">
                        <label class="form-label">评分</label>
                        <div class="rating-input" id="ratingInput">
                            <button type="button" class="star-btn" data-rating="1">★</button>
                            <button type="button" class="star-btn" data-rating="2">★</button>
                            <button type="button" class="star-btn" data-rating="3">★</button>
                            <button type="button" class="star-btn" data-rating="4">★</button>
                            <button type="button" class="star-btn" data-rating="5">★</button>
                        </div>
                        <input type="hidden" id="ratingValue" name="rating" required>
                    </div>
                    <div class="form-group">
                        <label for="reviewTitle" class="form-label">标题</label>
                        <input type="text" id="reviewTitle" name="title" class="form-input" placeholder="用一句话总结您的体验" required>
                    </div>
                    <div class="form-group">
                        <label for="reviewContent" class="form-label">内容</label>
                        <textarea id="reviewContent" name="content" class="form-textarea" rows="6" placeholder="分享您的详细体验..." required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelEditBtn">取消</button>
                <button class="btn btn-primary" id="saveEditBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>删除点评</h3>
                <button class="modal-close" id="deleteModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <p>确定要删除这条点评吗？此操作无法撤销。</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDeleteBtn">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Tripadvisor. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        import { authService } from '../services/auth.js';
        import { initAuth } from '../utils/auth.js';

        // 检查登录状态
        if (!authService.isAuthenticated()) {
            window.location.href = 'auth.html?return=' + encodeURIComponent(window.location.pathname);
        }

        // 初始化认证UI
        initAuth();
    </script>
    <script type="module" src="../pages/reviews/my-reviews.js"></script>
</body>
</html>
