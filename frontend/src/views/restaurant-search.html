<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食搜索 - TripAdvisor</title>
    <link rel="stylesheet" href="../styles/base/styles.css">
    <link rel="stylesheet" href="../styles/pages/restaurant-search.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header" id="header">
        <div class="header-scrolled" id="headerScrolled">
            <div class="container">
                <nav class="navbar-scrolled">
                    <div class="logo">
                        <a href="index.html">
                            <svg width="166" height="28" viewBox="0 0 166 28">
                                <path d="M14 0C6.3 0 0 6.3 0 14s6.3 14 14 14 14-6.3 14-14S21.7 0 14 0zm0 25c-6.1 0-11-4.9-11-11S7.9 3 14 3s11 4.9 11 11-4.9 11-11 11z" fill="#00AA6C"/>
                                <circle cx="9" cy="14" r="3.5" fill="#00AA6C"/>
                                <circle cx="19" cy="14" r="3.5" fill="#00AA6C"/>
                                <text x="32" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#000">Tripadvisor</text>
                            </svg>
                        </a>
                    </div>
                    <div class="search-bar-compact">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input type="text" placeholder="搜索" class="search-input-compact">
                    </div>
                    <div class="nav-tabs">
                        <a href="hotel-page.html" class="nav-tab">酒店</a>
                        <a href="attractions.html" class="nav-tab">景点玩乐</a>
                        <a href="restaurant.html" class="nav-tab active">美食</a>
                        <a href="#" class="nav-tab">游船</a>
                    </div>
                    <div class="nav-right">
                        <a href="#" class="nav-link">发现</a>
                        <a href="#" class="nav-link">点评</a>
                        <button class="icon-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="2" y1="12" x2="22" y2="12"></line>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                            </svg>
                        </button>
                        <span class="currency">USD</span>
                        <button class="avatar-btn">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ff6b6b'/%3E%3C/svg%3E" alt="avatar">
                        </button>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- 搜索栏 -->
    <div class="search-bar-section">
        <div class="search-container">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" placeholder="搜索餐厅、美食或菜系" value="长沙">
                <button class="search-btn">🔍</button>
            </div>
            <div class="search-filters">
                <button class="filter-btn active">全部</button>
                <button class="filter-btn">中餐</button>
                <button class="filter-btn">西餐</button>
                <button class="filter-btn">快餐</button>
                <button class="filter-btn">咖啡厅</button>
            </div>
        </div>
    </div>

    <!-- 主要内容区 -->
    <main class="main-content">
        <div class="content-wrapper">
            <button class="back-button" onclick="window.history.length > 1 ? window.history.back() : window.location.href='index.html'" style="margin-bottom: 20px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回</span>
            </button>
            <!-- 侧边栏筛选 -->
            <aside class="sidebar">
                <div class="filter-section">
                    <h3>筛选结果</h3>

                    <div class="filter-group">
                        <label class="filter-category-item active">
                            <input type="radio" name="category" value="all" checked>
                            <span>所有结果</span>
                        </label>
                        <label class="filter-category-item">
                            <input type="radio" name="category" value="attractions">
                            <span>景点玩乐</span>
                        </label>
                        <label class="filter-category-item">
                            <input type="radio" name="category" value="hotels">
                            <span>酒店</span>
                        </label>
                        <label class="filter-category-item">
                            <input type="radio" name="category" value="destinations">
                            <span>目的地</span>
                        </label>
                        <label class="filter-category-item">
                            <input type="radio" name="category" value="restaurants">
                            <span>餐厅</span>
                        </label>
                    </div>

                    <div class="filter-divider"></div>

                    <button class="clear-filters-btn">清除筛选</button>
                </div>

                <!-- 推荐小组件 -->
                <div class="sidebar-widget">
                    <h3>热门推荐</h3>
                    <!-- 推荐内容将通过 JavaScript 动态加载 -->
                </div>
            </aside>

            <!-- 餐厅列表 -->
            <section class="restaurant-list">
                <div class="list-header">
                    <h2 id="pageTitle">搜索结果</h2>
                    <div class="sort-options">
                        <label>排序：</label>
                        <select id="sortSelect">
                            <option value="recommended">推荐</option>
                            <option value="rating">评分最高</option>
                            <option value="reviews">评论最多</option>
                            <option value="price-low">价格从低到高</option>
                            <option value="price-high">价格从高到低</option>
                        </select>
                    </div>
                </div>

                <!-- 餐厅卡片容器 -->
                <div id="restaurantContainer" class="restaurant-cards">
                    <!-- 餐厅卡片将通过 JavaScript 动态加载 -->
                </div>

                <!-- 加载更多按钮 -->
                <div class="load-more-section">
                    <button id="loadMoreBtn" class="load-more-btn">加载更多</button>
                </div>
            </section>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; 2024 TripAdvisor. 保留所有权利。</p>
            <div class="footer-links">
                <a href="#">关于我们</a>
                <a href="#">隐私政策</a>
                <a href="#">使用条款</a>
                <a href="#">联系我们</a>
            </div>
        </div>
    </footer>

    <script src="../pages/restaurants/search.js"></script>
</body>
</html>
