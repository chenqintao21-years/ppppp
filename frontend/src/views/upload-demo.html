<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片上传示例 - Tripadvisor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .upload-section {
            margin-bottom: 40px;
            padding: 20px;
            border: 2px dashed #ddd;
            border-radius: 8px;
        }

        .upload-section h2 {
            margin-bottom: 15px;
            color: #555;
            font-size: 18px;
        }

        .upload-area {
            position: relative;
            padding: 40px;
            text-align: center;
            background: #fafafa;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .upload-area:hover {
            background: #f0f0f0;
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 48px;
            color: #00aa6c;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            margin-bottom: 5px;
        }

        .upload-hint {
            font-size: 12px;
            color: #999;
        }

        .preview-area {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .preview-item {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .preview-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .preview-item .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            color: #e63946;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-item .remove-btn:hover {
            background: white;
        }

        .upload-btn {
            margin-top: 15px;
            padding: 10px 30px;
            background: #00aa6c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .upload-btn:hover {
            background: #009959;
        }

        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }

        .progress-bar-fill {
            height: 100%;
            background: #00aa6c;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片上传示例</h1>

        <!-- 单张图片上传 -->
        <div class="upload-section">
            <h2>上传头像（单张）</h2>
            <div class="upload-area" id="avatarUploadArea">
                <input type="file" id="avatarInput" accept="image/*">
                <div class="upload-icon">📷</div>
                <div class="upload-text">点击或拖拽上传头像</div>
                <div class="upload-hint">支持 JPG, PNG, WebP, GIF 格式，最大 10MB</div>
            </div>
            <div class="preview-area" id="avatarPreview"></div>
            <button class="upload-btn" id="uploadAvatarBtn" disabled>上传头像</button>
            <div class="progress-bar" id="avatarProgress">
                <div class="progress-bar-fill"></div>
            </div>
            <div class="result" id="avatarResult"></div>
        </div>

        <!-- 多张图片上传 -->
        <div class="upload-section">
            <h2>上传点评图片（多张）</h2>
            <div class="upload-area" id="reviewUploadArea">
                <input type="file" id="reviewInput" accept="image/*" multiple>
                <div class="upload-icon">🖼️</div>
                <div class="upload-text">点击或拖拽上传图片</div>
                <div class="upload-hint">支持多张图片，最多10张，每张最大 10MB</div>
            </div>
            <div class="preview-area" id="reviewPreview"></div>
            <button class="upload-btn" id="uploadReviewBtn" disabled>上传图片</button>
            <div class="progress-bar" id="reviewProgress">
                <div class="progress-bar-fill"></div>
            </div>
            <div class="result" id="reviewResult"></div>
        </div>

        <!-- 城市封面上传 -->
        <div class="upload-section">
            <h2>上传城市封面</h2>
            <div class="upload-area" id="destinationUploadArea">
                <input type="file" id="destinationInput" accept="image/*">
                <div class="upload-icon">🏙️</div>
                <div class="upload-text">点击或拖拽上传城市封面</div>
                <div class="upload-hint">建议尺寸 1920x1080，支持 JPG, PNG, WebP</div>
            </div>
            <div>
                <label style="display: block; margin-top: 15px;">
                    城市ID: <input type="number" id="destinationId" placeholder="输入城市ID" style="padding: 5px; margin-left: 10px;">
                </label>
            </div>
            <div class="preview-area" id="destinationPreview"></div>
            <button class="upload-btn" id="uploadDestinationBtn" disabled>上传封面</button>
            <div class="progress-bar" id="destinationProgress">
                <div class="progress-bar-fill"></div>
            </div>
            <div class="result" id="destinationResult"></div>
        </div>
    </div>

    <script src="upload-demo.js"></script>
</body>
</html>
