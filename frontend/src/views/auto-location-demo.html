<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动定位导入演示 - TripAdvisor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 16px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .demo-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .demo-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .button-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            padding: 14px 28px;
            background: #00aa6c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #008c5a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 170, 108, 0.3);
        }

        button.secondary {
            background: #667eea;
        }

        button.secondary:hover {
            background: #5568d3;
        }

        .info-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #00aa6c;
            margin-top: 20px;
        }

        .info-box h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-weight: 600;
        }

        .page-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .page-link {
            display: block;
            padding: 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
        }

        .page-link:hover {
            border-color: #00aa6c;
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(0, 170, 108, 0.2);
        }

        .page-link h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #00aa6c;
        }

        .page-link p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.active {
            background: #00aa6c;
            animation: pulse 2s infinite;
        }

        .status-indicator.inactive {
            background: #ccc;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 自动定位导入演示</h1>
        <p class="subtitle">页面加载时自动定位并导入城市数据</p>

        <div class="demo-section">
            <h2>当前状态</h2>
            <div class="info-box">
                <h3>
                    <span class="status-indicator" id="statusIndicator"></span>
                    系统状态
                </h3>
                <div class="info-item">
                    <span class="info-label">当前城市:</span>
                    <span class="info-value" id="currentCity">检测中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">导入状态:</span>
                    <span class="info-value" id="importStatus">等待中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">酒店数据:</span>
                    <span class="info-value" id="hotelCount">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">景点数据:</span>
                    <span class="info-value" id="attractionCount">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">餐厅数据:</span>
                    <span class="info-value" id="restaurantCount">-</span>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h2>手动操作</h2>
            <div class="button-group">
                <button id="refreshBtn">🔄 重新定位并导入</button>
                <button id="clearCacheBtn" class="secondary">🗑️ 清除缓存</button>
            </div>
        </div>

        <div class="demo-section">
            <h2>访问页面查看效果</h2>
            <p style="margin-bottom: 20px; color: #666;">
                数据导入完成后，访问以下页面即可看到自动加载的城市数据：
            </p>
            <div class="page-links">
                <a href="hotel-page.html" class="page-link">
                    <h3>🏨 酒店页面</h3>
                    <p>查看当前城市的热门酒店</p>
                </a>
                <a href="attractions-search.html" class="page-link">
                    <h3>🎭 景点页面</h3>
                    <p>浏览当前城市的景点玩乐</p>
                </a>
                <a href="restaurant.html" class="page-link">
                    <h3>🍜 美食页面</h3>
                    <p>发现当前城市的美食餐厅</p>
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { autoLocationImportService, initAutoLocationImport } from '../services/autoLocationImport.js';

        // 更新状态显示
        function updateStatus(city, status, data = null) {
            document.getElementById('currentCity').textContent = city || '未知';
            document.getElementById('importStatus').textContent = status;

            const indicator = document.getElementById('statusIndicator');
            if (status === '导入成功' || status === '数据已存在') {
                indicator.className = 'status-indicator active';
            } else {
                indicator.className = 'status-indicator inactive';
            }

            if (data) {
                document.getElementById('hotelCount').textContent = data.imported?.hotels || 0;
                document.getElementById('attractionCount').textContent = data.imported?.attractions || 0;
                document.getElementById('restaurantCount').textContent = data.imported?.restaurants || 0;
            }
        }

        // 初始化自动导入
        async function init() {
            updateStatus('检测中...', '正在定位...');

            const result = await initAutoLocationImport({ autoStart: true, silent: false });

            if (result.success) {
                updateStatus(result.city, result.cached ? '数据已存在' : '导入成功', result.data);
            } else {
                updateStatus('定位失败', result.error || '导入失败');
            }
        }

        // 重新定位并导入
        document.getElementById('refreshBtn').addEventListener('click', async () => {
            updateStatus('检测中...', '正在重新定位...');

            const result = await autoLocationImportService.autoLocationAndImport({
                silent: false,
                force: true
            });

            if (result.success) {
                updateStatus(result.city, '导入成功', result.data);
            } else {
                updateStatus('定位失败', result.error || '导入失败');
            }
        });

        // 清除缓存
        document.getElementById('clearCacheBtn').addEventListener('click', () => {
            autoLocationImportService.clearCache();
            alert('缓存已清除！刷新页面将重新导入数据。');
            location.reload();
        });

        // 监听城市数据导入事件
        window.addEventListener('cityDataImported', (event) => {
            const { city, data } = event.detail;
            updateStatus(city, '导入成功', data);
        });

        // 页面加载时初始化
        init();
    </script>
</body>
</html>
