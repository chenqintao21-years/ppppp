<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
        }
        h1 { color: #333; margin-bottom: 30px; }
        .test-box {
            background: #f9f9f9;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 6px;
            border-left: 4px solid #00aa6c;
        }
        .test-box h3 { margin-bottom: 15px; color: #333; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #00aa6c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        .btn:hover { background: #008c5a; }
        .btn:active { transform: scale(0.98); }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #00aa6c; }
        .error { color: #e74c3c; }
        .info { color: #3498db; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 自动导入功能测试</h1>

        <div class="test-box">
            <h3>步骤1: 测试后端连接</h3>
            <input type="button" class="btn" value="测试后端" onclick="test1()">
            <div id="result1" class="result"></div>
        </div>

        <div class="test-box">
            <h3>步骤2: 测试导入北京数据</h3>
            <input type="button" class="btn" value="导入北京" onclick="test2()">
            <div id="result2" class="result"></div>
        </div>

        <div class="test-box">
            <h3>步骤3: 查询导入的数据</h3>
            <input type="button" class="btn" value="查询酒店" onclick="test3()">
            <input type="button" class="btn" value="查询景点" onclick="test4()">
            <input type="button" class="btn" value="查询餐厅" onclick="test5()">
            <div id="result3" class="result"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';

        function log(id, msg, type = 'info') {
            const el = document.getElementById(id);
            const span = document.createElement('div');
            span.className = type;
            span.textContent = msg;
            el.appendChild(span);
        }

        function clear(id) {
            document.getElementById(id).innerHTML = '';
        }

        async function test1() {
            clear('result1');
            log('result1', '正在测试后端连接...', 'info');

            try {
                const res = await fetch(API + '/../health');
                const data = await res.json();

                if (data.success) {
                    log('result1', '✓ 后端连接成功！', 'success');
                    log('result1', '服务器状态: ' + data.status, 'success');
                } else {
                    log('result1', '✗ 后端响应异常', 'error');
                }
            } catch (err) {
                log('result1', '✗ 连接失败: ' + err.message, 'error');
            }
        }

        async function test2() {
            clear('result2');
            log('result2', '正在导入北京数据，请稍候...', 'info');

            try {
                const res = await fetch(API + '/city/auto-import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ city: '北京' })
                });
                const data = await res.json();

                if (data.success) {
                    log('result2', '✓ 导入成功！', 'success');
                    log('result2', '城市: ' + data.data.city, 'success');
                    log('result2', '酒店: ' + data.data.imported.hotels + ' 条', 'success');
                    log('result2', '景点: ' + data.data.imported.attractions + ' 条', 'success');
                    log('result2', '餐厅: ' + data.data.imported.restaurants + ' 条', 'success');
                    log('result2', '总计: ' + data.data.total + ' 条', 'success');
                } else {
                    log('result2', '✗ 导入失败: ' + data.message, 'error');
                }
            } catch (err) {
                log('result2', '✗ 请求失败: ' + err.message, 'error');
            }
        }

        async function test3() {
            clear('result3');
            log('result3', '正在查询酒店数据...', 'info');

            try {
                const res = await fetch(API + '/hotels/search?city=北京&limit=5');
                const data = await res.json();

                if (data.success && data.data && data.data.length > 0) {
                    log('result3', '✓ 找到 ' + data.data.length + ' 家酒店', 'success');
                    data.data.forEach(h => {
                        log('result3', '  - ' + h.name, 'info');
                    });
                } else {
                    log('result3', '✗ 未找到酒店数据', 'error');
                }
            } catch (err) {
                log('result3', '✗ 查询失败: ' + err.message, 'error');
            }
        }

        async function test4() {
            clear('result3');
            log('result3', '正在查询景点数据...', 'info');

            try {
                const res = await fetch(API + '/attractions/search?location=北京&limit=5');
                const data = await res.json();

                if (data.success && data.data && data.data.length > 0) {
                    log('result3', '✓ 找到 ' + data.data.length + ' 个景点', 'success');
                    data.data.forEach(a => {
                        log('result3', '  - ' + a.name, 'info');
                    });
                } else {
                    log('result3', '✗ 未找到景点数据', 'error');
                }
            } catch (err) {
                log('result3', '✗ 查询失败: ' + err.message, 'error');
            }
        }

        async function test5() {
            clear('result3');
            log('result3', '正在查询餐厅数据...', 'info');

            try {
                const res = await fetch(API + '/restaurants/search?city=北京&limit=5');
                const data = await res.json();

                if (data.success && data.data && data.data.length > 0) {
                    log('result3', '✓ 找到 ' + data.data.length + ' 家餐厅', 'success');
                    data.data.forEach(r => {
                        log('result3', '  - ' + r.name, 'info');
                    });
                } else {
                    log('result3', '✗ 未找到餐厅数据', 'error');
                }
            } catch (err) {
                log('result3', '✗ 查询失败: ' + err.message, 'error');
            }
        }
    </script>
</body>
</html>
